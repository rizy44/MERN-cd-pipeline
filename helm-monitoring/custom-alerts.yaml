# custom-alerts.yaml
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: custom-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
    - name: application-alerts
      rules:
        - alert: HighErrorRate
          expr: |
            sum by (route, method) (rate(http_requests_total{status_code=~"5.."}[5m]))
            /
            sum by (route, method) (rate(http_requests_total[5m])) > 0.05
          for: 5m
          labels:
            severity: critical
            layer: application
            app: backend
            component: api
            service: backend-service
            team: platform
          annotations:
            summary: High error rate detected
            description: Error rate is {{ printf "%.2f" (mul $value 100) }}% on {{ $labels.method }} {{ $labels.route }}

        - alert: HighLatency
          expr: |
            histogram_quantile(0.95, sum by (le, route, method) (rate(http_request_duration_seconds_bucket[5m]))) > 1
          for: 5m
          labels:
            severity: warning
            layer: application
            app: backend
            component: api
            service: backend-service
            team: platform
          annotations:
            summary: High latency detected
            description: 95th percentile latency is {{ printf "%.2f" $value }}s on {{ $labels.method }} {{ $labels.route }}

        - alert: PodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total[15m]) > 0.2
          for: 5m
          labels:
            severity: warning
            layer: pod
            app: backend
            component: workload
            service: backend-service
            team: platform
          annotations:
            summary: Pod is crash looping
            description: Pod {{ $labels.namespace }}/{{ $labels.pod }} is restarting frequently

        - alert: HighMemoryUsage
          expr: |
            container_memory_usage_bytes{container!=""} 
            / 
            container_spec_memory_limit_bytes{container!=""} > 0.9
          for: 5m
          labels:
            severity: warning
            layer: pod
            app: backend
            component: container
            service: backend-service
            team: platform
          annotations:
            summary: High memory usage
            description: Container {{ $labels.container }} in {{ $labels.pod }} using > 90% memory

        - alert: NodeFilesystemAlmostFull
          expr: |
            1 - (
              node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"}
              /
              node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"}
            ) > 0.9
          for: 10m
          labels:
            severity: warning
            layer: node
            app: infrastructure
            component: node-exporter
            service: node-exporter
            team: platform
          annotations:
            summary: Node filesystem almost full
            description: Filesystem on {{ $labels.instance }} is above 90% usage
