alertmanager:
  config:
    global:
      resolve_timeout: 5m
      slack_api_url_file: '/etc/alertmanager/secrets/alertmanager-slack-secret/slack-webhook-url'

    route:
      group_by: ['layer', 'alertname', 'namespace', 'service']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'slack-default'
      routes:
        - match:
            layer: application
          group_by: ['alertname', 'service', 'route', 'method']
          receiver: 'team-backend'
          routes:
            - match:
                severity: critical
              receiver: 'slack-critical'
            - match:
                severity: warning
              receiver: 'team-backend'
        - match:
            layer: pod
          group_by: ['alertname', 'namespace', 'pod', 'container']
          receiver: 'slack-warnings'
          routes:
            - match:
                severity: critical
              receiver: 'slack-critical'
            - match:
                severity: warning
              receiver: 'slack-warnings'
        - match:
            layer: node
          group_by: ['alertname', 'instance', 'node', 'service']
          receiver: 'slack-warnings'
          routes:
            - match:
                severity: critical
              receiver: 'slack-critical'
            - match:
                severity: warning
              receiver: 'slack-warnings'
        - match:
            service: backend-service
          receiver: 'team-backend'

    receivers:
      # 1. Receiver mặc định
      - name: 'slack-default'
        slack_configs:
          - channel: '#alerts-general' # Kênh nhận các cảnh báo không thuộc phân loại nào
            send_resolved: true
            title: '{{ .Status | toUpper }}: {{ .CommonLabels.alertname }}'
            text: '{{ range .Alerts }}*Description:* {{ .Annotations.description }}{{ end }}'

      # 2. Receiver cho cảnh báo Critical (thay cho PagerDuty)
      - name: 'slack-critical'
        slack_configs:
          - channel: '#alerts-critical'
            send_resolved: true
            color: 'danger'
            title: '🚨 CRITICAL: {{ .CommonLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

      # 3. Receiver cho cảnh báo Warning
      - name: 'slack-warnings'
        slack_configs:
          - channel: '#alerts-warning'
            send_resolved: true
            color: 'warning' 
            title: '⚠️ WARNING: {{ .CommonLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

      # 4. Receiver riêng cho team backend
      - name: 'team-backend'
        slack_configs:
          - channel: '#backend-alerts'
            send_resolved: true
            title: '{{ .Status | toUpper }} (Backend): {{ .CommonLabels.alertname }}'

    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'layer', 'namespace', 'service']
