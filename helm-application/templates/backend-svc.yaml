apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.backend.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.backend.labels.app | default "backend" }}
    app.kubernetes.io/name: {{ .Values.backend.name }}
    app.kubernetes.io/component: {{ .Values.backend.labels.component | default "backend" }}
    app.kubernetes.io/part-of: {{ .Values.backend.labels.partOf | default "mern" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Values.backend.labels.managedBy | default "Helm" }}
    app.kubernetes.io/service-name: {{ .Values.backend.serviceName | default .Values.service.backend.name }}
    monitoring.layer: {{ .Values.backend.labels.monitoringLayer | default "application" }}
    monitoring.team: {{ .Values.backend.labels.team | default "platform" }}
  annotations:
    prometheus.io/scrape: "{{ .Values.metrics.enabled }}"
    prometheus.io/path: "{{ .Values.metrics.path }}"
    prometheus.io/port: "{{ .Values.metrics.port }}"
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.backend.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: {{ .Values.backend.podLabels.app }}
