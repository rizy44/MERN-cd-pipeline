apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.backend.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.backend.labels.app | default "backend" }}
    app.kubernetes.io/name: {{ .Values.backend.name }}
    app.kubernetes.io/component: {{ .Values.backend.labels.component | default "backend" }}
    app.kubernetes.io/part-of: {{ .Values.backend.labels.partOf | default "mern" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Values.backend.labels.managedBy | default "Helm" }}
    monitoring.layer: {{ .Values.backend.labels.monitoringLayer | default "application" }}
    monitoring.team: {{ .Values.backend.labels.team | default "platform" }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.backend.replicaCount }}
  {{- end }}
  {{- with .Values.strategy }}
  strategy:
{{ toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ .Values.backend.podLabels.app | default "backend" }}
  template:
    metadata:
      labels:
        app: {{ .Values.backend.podLabels.app | default "backend" }}
        app.kubernetes.io/name: {{ .Values.backend.name }}
        app.kubernetes.io/component: {{ .Values.backend.labels.component | default "backend" }}
        app.kubernetes.io/part-of: {{ .Values.backend.labels.partOf | default "mern" }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/managed-by: {{ .Values.backend.labels.managedBy | default "Helm" }}
        monitoring.layer: {{ .Values.backend.labels.monitoringLayer | default "application" }}
        monitoring.team: {{ .Values.backend.labels.team | default "platform" }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
{{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Values.backend.name }}
          {{- with .Values.securityContext }}
          securityContext:
{{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.backend.image }}
          image: "{{ .repository }}:{{ .tag | default $.Chart.AppVersion }}"
          imagePullPolicy: {{ .pullPolicy }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.port }}
              protocol: TCP
          env:
          {{- with .Values.backend.env }}
{{ toYaml . | nindent 12 }}
          {{- end }}
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: mern-secret
                  key: mongo-uri
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mern-secret
                  key: jwt-secret
          {{- with .Values.backend.livenessProbe }}
          livenessProbe:
{{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.backend.readinessProbe }}
          readinessProbe:
{{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.backend.resources }}
          resources:
{{ toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.volumeMounts }}
          volumeMounts:
{{ toYaml . | nindent 12 }}
      {{- end }}
      {{- with .Values.volumes }}
      volumes:
{{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
{{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
{{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
{{ toYaml . | nindent 8 }}
      {{- end }}
