apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.frontend.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.frontend.labels.app | default "frontend" }}
    app.kubernetes.io/name: {{ .Values.frontend.name }}
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: mern
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: Helm
    monitoring.layer: application
    monitoring.team: platform
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.frontend.replicaCount }}
  {{- end }}
  {{- with .Values.strategy }}
  strategy:
{{ toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ .Values.frontend.podLabels.app | default "frontend" }}
  template:
    metadata:
      labels:
        app: {{ .Values.frontend.podLabels.app | default "frontend" }}
        app.kubernetes.io/name: {{ .Values.frontend.name }}
        app.kubernetes.io/component: {{ .Values.frontend.labels.component | default "frontend" }}
        app.kubernetes.io/part-of: {{ .Values.frontend.labels.partOf | default "mern" }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/managed-by: {{ .Values.frontend.labels.managedBy | default "Helm" }}
        monitoring.layer: {{ .Values.frontend.labels.monitoringLayer | default "application" }}
        monitoring.team: {{ .Values.frontend.labels.team | default "platform" }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
{{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Values.frontend.name }}
          {{- with .Values.securityContext }}
          securityContext:
{{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.frontend.image }}
          image: "{{ .repository }}:{{ .tag | default $.Chart.AppVersion }}"
          imagePullPolicy: {{ .pullPolicy }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.port }}
              protocol: TCP
          {{- with .Values.frontend.livenessProbe }}
          livenessProbe:
{{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.frontend.readinessProbe }}
          readinessProbe:
{{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.frontend.resources }}
          resources:
{{ toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.volumeMounts }}
          volumeMounts:
{{ toYaml . | nindent 12 }}
      {{- end }}
      {{- with .Values.volumes }}
      volumes:
{{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
{{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
{{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
{{ toYaml . | nindent 8 }}
      {{- end }}
