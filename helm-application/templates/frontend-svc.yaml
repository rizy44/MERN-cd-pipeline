apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.frontend.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.frontend.labels.app | default "frontend" }}
    app.kubernetes.io/name: {{ .Values.frontend.name }}
    app.kubernetes.io/component: {{ .Values.frontend.labels.component | default "frontend" }}
    app.kubernetes.io/part-of: {{ .Values.frontend.labels.partOf | default "mern" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Values.frontend.labels.managedBy | default "Helm" }}
    app.kubernetes.io/service-name: {{ .Values.frontend.serviceName | default .Values.service.frontend.name }}
    monitoring.layer: {{ .Values.frontend.labels.monitoringLayer | default "application" }}
    monitoring.team: {{ .Values.frontend.labels.team | default "platform" }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.frontend.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: {{ .Values.frontend.podLabels.app }}
